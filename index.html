<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="hero">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input type="text">
        <button id="btn-convert">Convert</button>
    </div>
    <div id="container">
        <div class="box">
            <h3>Length (Meter/Feet)</h3>
            <p id="length">20 Meters = 65.616 feet | 20 feet = 6.096</p>
        </div>

        <div class="box">
            <h3>Volume (Liters/Gallons)</h3>
            <p id="volume">20 liters = 5.284 gallons | 20 gallons = 75.708 liters</p>
        </div>

        <div class="box">
            <h3>Mass (Kilograms/Pounds)</h3>
            <p id="mass">20 kilos = 44.092 | 20 pounds = 9.072 kilos</p>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
