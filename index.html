<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="hero">
        <h1 id="hero-heading">Metric/Imperial Unit Conversion</h1>
        <div id="conversion">
            <input type="number" id="num-convert">
            <button id="btn-convert">Convert</button>
        </div>
    </div>
    <div id="container">
        <div class="box">
            <h3 class="unit">Length (Meter/Feet)</h3>
            <p class="unit-desc" id="length">20 Meters = 65.616 feet | 20 feet = 6.096</p>
        </div>

        <div class="box">
            <h3 class="unit">Volume (Liters/Gallons)</h3>
            <p class="unit-desc" id="volume">20 liters = 5.284 gallons | 20 gallons = 75.708 liters</p>
        </div>

        <div class="box">
            <h3 class="unit">Mass (Kilograms/Pounds)</h3>
            <p class="unit-desc" id="mass">20 kilos = 44.092 | 20 pounds = 9.072 kilos</p>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
